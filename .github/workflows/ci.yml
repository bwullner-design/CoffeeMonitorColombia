# ─────────────────────────────────────────────
# CoffeeMonitor Colombia - CI Pipeline
# ─────────────────────────────────────────────
# Ejecuta tests automáticamente en cada push y pull request.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Inicializar base de datos
        run: python main.py --init

      - name: Ejecutar tests
        run: python -m pytest tests/ -v --tb=short

      - name: Tests con cobertura
        run: |
          python -m pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml
        if: matrix.python-version == '3.12'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar linters
        run: pip install ruff black isort

      - name: Ruff check
        run: ruff check . --ignore E501
        continue-on-error: true

      - name: Black check
        run: black --check --line-length 100 .
        continue-on-error: true
