# ─────────────────────────────────────────────
# CoffeeMonitor Colombia - Captura Diaria Automatizada
# ─────────────────────────────────────────────
# Ejecuta la captura diaria a las 9:00 PM hora Colombia (02:00 UTC).
# Los datos se guardan como artefacto descargable.

name: Captura Diaria

on:
  schedule:
    # 9:00 PM Colombia (UTC-5) = 02:00 UTC del día siguiente
    - cron: '0 2 * * 1-5'  # Lunes a viernes

  # También permite ejecución manual desde GitHub
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restaurar base de datos
        uses: actions/cache@v4
        with:
          path: data/coffeemonitor.db
          key: coffeemonitor-db-${{ github.run_number }}
          restore-keys: |
            coffeemonitor-db-

      - name: Inicializar DB (si es primera vez)
        run: python main.py --init

      - name: Ejecutar captura completa
        run: python main.py --capture -v

      - name: Mostrar dashboard
        run: python main.py --dashboard

      - name: Exportar datos del día
        run: |
          DATE=$(date +%Y-%m-%d)
          python main.py --export ranking $DATE
          python main.py --export alerts

      - name: Guardar base de datos como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coffeemonitor-db-${{ github.run_number }}
          path: data/coffeemonitor.db
          retention-days: 90

      - name: Guardar exportaciones como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: exports-${{ github.run_number }}
          path: exports/
          retention-days: 30

      - name: Guardar logs como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
        if: always()
